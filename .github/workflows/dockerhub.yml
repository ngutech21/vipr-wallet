name: Build docker image and push to DockerHub & DigitalOcean

on:
  push:
    branches:
      - master
  workflow_dispatch: {}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.filter.outputs.deploy }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Detect deploy-relevant changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            deploy:
              - 'src/**'
              - 'src-pwa/**'
              - 'public/**'
              - 'Dockerfile'
              - 'docker/**'
              - '.dockerignore'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'quasar.config.ts'
              - 'tsconfig*.json'
              - 'vite.config.*'

  build-and-push:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.deploy == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to docker.io
        uses: docker/login-action@v4.1.0
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_NAME }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Get current date
        id: date
        run: echo "date=$(date -u '+%F-%T')" >> "$GITHUB_OUTPUT"

      - name: Get short SHA
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            COMMITHASH=${{ steps.sha.outputs.sha }}
            BUILDTIME=${{ steps.date.outputs.date }}
          tags: docker.io/${{ secrets.DOCKER_NAME }}/vipr-wallet:${{ steps.sha.outputs.sha }}-alpine, docker.io/${{ secrets.DOCKER_NAME }}/vipr-wallet:latest

      - name: Deploy to DigitalOcean
        uses: digitalocean/app_action/deploy@v2
        with:
          app_name: vipr-wallet
          token: ${{ secrets.DO_TOKEN }}
