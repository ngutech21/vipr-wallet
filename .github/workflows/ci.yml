name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  static:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Dependency review
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/dependency-review-action@v5

      - name: Scan config
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: .
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        # Enforce deterministic installs from pnpm-lock.yaml:
        # fail CI if package.json and lockfile are out of sync.
        # also fail on peer dependency incompatibilities.
        run: pnpm install --frozen-lockfile --strict-peer-dependencies

      - name: Check code formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Type check PWA
        run: pnpm typecheck:pwa

      - name: Audit production dependencies
        run: pnpm audit --prod

      - name: Verify dependency signatures
        run: pnpm audit signatures

      - name: Check circular dependencies
        run: pnpm dlx madge src --circular

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --strict-peer-dependencies

      - name: Build frontend
        run: pnpm build

  unit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --strict-peer-dependencies

      - name: Run unit tests with coverage
        run: pnpm coverage

      - name: Upload coverage to Codecov
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          verbose: true

  docker-smoke:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: vipr-wallet:pr-check
          cache-from: type=gha,scope=vipr-wallet-pr
          cache-to: type=gha,mode=max,scope=vipr-wallet-pr

      - name: Scan Docker image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: vipr-wallet:pr-check
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

  deploy-dev:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
    needs:
      - static
      - build
      - unit
    runs-on: ubuntu-latest
    env:
      DO_DEV_APP_NAME: ${{ secrets.DO_DEV_APP_NAME }}
      DO_DEV_DOMAIN: ${{ vars.DO_DEV_DOMAIN || 'dev.vipr.cash' }}
      DO_DEV_DOMAIN_ZONE: ${{ vars.DO_DEV_DOMAIN_ZONE || 'vipr.cash' }}
      DO_DEV_REGION: ${{ vars.DO_DEV_REGION || 'fra' }}
      DO_DEV_INSTANCE_SIZE: ${{ vars.DO_DEV_INSTANCE_SIZE || 'apps-s-1vcpu-0.5gb' }}
      DO_DEV_SERVICE_NAME: ${{ vars.DO_DEV_SERVICE_NAME || 'ngutech-21-vipr-wallet' }}
      DOCKER_NAME: ${{ secrets.DOCKER_NAME }}
      DOCKER_HUB_CREDENTIALS: ${{ secrets.DOCKER_NAME }}:${{ secrets.DOCKER_PAT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to docker.io
        uses: docker/login-action@v4.1.0
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_NAME }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Get commit SHAs
        id: sha
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Read package version
        id: version
        run: |
          echo "version=$(node -p 'require(\"./package.json\").version')" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        id: build-image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
          build-args: |
            COMMITHASH=${{ steps.sha.outputs.short_sha }}
            APP_VERSION=${{ steps.version.outputs.version }}
          tags: |
            docker.io/${{ secrets.DOCKER_NAME }}/vipr-wallet:${{ steps.sha.outputs.sha }}-alpine
            docker.io/${{ secrets.DOCKER_NAME }}/vipr-wallet:dev-latest

      - name: Scan Docker image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: docker.io/${{ secrets.DOCKER_NAME }}/vipr-wallet:${{ steps.sha.outputs.sha }}-alpine
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
        env:
          TRIVY_USERNAME: ${{ secrets.DOCKER_NAME }}
          TRIVY_PASSWORD: ${{ secrets.DOCKER_PAT }}

      - name: Deploy to DigitalOcean
        env:
          VIPR_DIGEST: ${{ steps.build-image.outputs.digest }}
        uses: digitalocean/app_action/deploy@v2
        with:
          token: ${{ secrets.DO_TOKEN }}
          app_spec_location: .do/app.dev.yaml

      - name: Update Docker Hub overview
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKER_NAME }}
          password: ${{ secrets.DOCKER_PAT }}
          repository: ${{ secrets.DOCKER_NAME }}/vipr-wallet
          short-description: Fedimint ecash wallet PWA for private Lightning payments
          readme-filepath: ./docs/dockerhub.md
