name: Deploy Dev

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions: read-all

concurrency:
  group: deploy-development
  cancel-in-progress: false

jobs:
  changes:
    if: >
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'master'
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.filter.outputs.deploy }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: refs/heads/master
          fetch-depth: 0

      - name: Verify checked-out commit
        run: |
          checked_out_sha="$(git rev-parse HEAD)"
          if [ "$checked_out_sha" != "${{ github.event.workflow_run.head_sha }}" ]; then
            echo "Checked out ${checked_out_sha}, expected ${{ github.event.workflow_run.head_sha }}"
            exit 1
          fi

      - name: Detect deploy-relevant changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          base: ${{ github.event.workflow_run.head_sha }}^
          ref: ${{ github.event.workflow_run.head_sha }}
          filters: |
            deploy:
              - 'src/**'
              - 'src-pwa/**'
              - 'public/**'
              - '.do/app.dev.yaml'
              - 'Dockerfile'
              - 'docker/**'
              - '.dockerignore'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'quasar.config.ts'
              - 'tsconfig*.json'
              - 'vite.config.*'

  deploy:
    needs: changes
    if: needs.changes.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    env:
      DO_DEV_APP_NAME: ${{ secrets.DO_DEV_APP_NAME }}
      DO_DEV_DOMAIN: ${{ vars.DO_DEV_DOMAIN || 'dev.vipr.cash' }}
      DO_DEV_DOMAIN_ZONE: ${{ vars.DO_DEV_DOMAIN_ZONE || 'vipr.cash' }}
      DO_DEV_REGION: ${{ vars.DO_DEV_REGION || 'fra' }}
      DO_DEV_INSTANCE_SIZE: ${{ vars.DO_DEV_INSTANCE_SIZE || 'apps-s-1vcpu-0.5gb' }}
      DO_DEV_SERVICE_NAME: ${{ vars.DO_DEV_SERVICE_NAME || 'ngutech-21-vipr-wallet' }}
      DOCKER_NAME: ${{ secrets.DOCKER_NAME }}
      DOCKER_HUB_CREDENTIALS: ${{ secrets.DOCKER_NAME }}:${{ secrets.DOCKER_PAT }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: refs/heads/master

      - name: Verify checked-out commit
        run: |
          checked_out_sha="$(git rev-parse HEAD)"
          if [ "$checked_out_sha" != "${{ github.event.workflow_run.head_sha }}" ]; then
            echo "Checked out ${checked_out_sha}, expected ${{ github.event.workflow_run.head_sha }}"
            exit 1
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to docker.io
        uses: docker/login-action@v4.1.0
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_NAME }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Get commit SHAs
        id: sha
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Read package version
        id: version
        run: |
          echo "version=$(node -p 'require(\"./package.json\").version')" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        id: build-image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
          build-args: |
            COMMITHASH=${{ steps.sha.outputs.short_sha }}
            APP_VERSION=${{ steps.version.outputs.version }}
          tags: |
            docker.io/${{ secrets.DOCKER_NAME }}/vipr-wallet:${{ steps.sha.outputs.sha }}-alpine
            docker.io/${{ secrets.DOCKER_NAME }}/vipr-wallet:dev-latest

      - name: Scan Docker image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: docker.io/${{ secrets.DOCKER_NAME }}/vipr-wallet:${{ steps.sha.outputs.sha }}-alpine
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
        env:
          TRIVY_USERNAME: ${{ secrets.DOCKER_NAME }}
          TRIVY_PASSWORD: ${{ secrets.DOCKER_PAT }}

      - name: Deploy to DigitalOcean
        env:
          VIPR_DIGEST: ${{ steps.build-image.outputs.digest }}
        uses: digitalocean/app_action/deploy@v2
        with:
          token: ${{ secrets.DO_TOKEN }}
          app_spec_location: .do/app.dev.yaml
