name: Release docker image and deploy to Production

on:
  release:
    types:
      - published

permissions: read-all

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-push:
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    environment: production
    env:
      DO_PRODUCTION_APP_NAME: ${{ secrets.DO_PRODUCTION_APP_NAME }}
      DO_PRODUCTION_REGION: ${{ vars.DO_PRODUCTION_REGION || 'fra' }}
      DO_PRODUCTION_INSTANCE_SIZE: ${{ vars.DO_PRODUCTION_INSTANCE_SIZE || 'apps-s-1vcpu-1gb' }}
      DOCKER_NAME: ${{ secrets.DOCKER_NAME }}
      DOCKER_HUB_CREDENTIALS: ${{ secrets.DOCKER_NAME }}:${{ secrets.DOCKER_PAT }}

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to docker.io
        uses: docker/login-action@v4.1.0
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_NAME }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Get current date
        id: date
        run: echo "date=$(date -u '+%F-%T')" >> "$GITHUB_OUTPUT"

      - name: Get short SHA
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Read package version
        id: version
        run: |
          echo "version=$(node -p 'require(\"./package.json\").version')" >> "$GITHUB_OUTPUT"

      - name: Verify release tag matches package version
        run: |
          if [ "v${{ steps.version.outputs.version }}" != "${{ github.event.release.tag_name }}" ]; then
            echo "Release tag does not match package.json version"
            exit 1
          fi

      - name: Build and push Docker image
        id: build-image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            COMMITHASH=${{ steps.sha.outputs.sha }}
            BUILDTIME=${{ steps.date.outputs.date }}
            APP_VERSION=${{ steps.version.outputs.version }}
          tags: |
            docker.io/${{ secrets.DOCKER_NAME }}/vipr-wallet:${{ github.event.release.tag_name }}
            docker.io/${{ secrets.DOCKER_NAME }}/vipr-wallet:latest

      - name: Deploy to DigitalOcean
        if: ${{ env.DO_PRODUCTION_APP_NAME != '' }}
        uses: digitalocean/app_action/deploy@v2
        env:
          VIPR_DIGEST: ${{ steps.build-image.outputs.digest }}
        with:
          token: ${{ secrets.DO_TOKEN }}
          app_spec_location: .do/app.production.yaml
