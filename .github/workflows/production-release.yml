name: Release docker image and deploy to Production

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: Commit SHA or ref to promote
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    environment: production
    env:
      DO_PRODUCTION_APP_NAME: ${{ secrets.DO_PRODUCTION_APP_NAME }}
      DO_PRODUCTION_DOMAIN: ${{ vars.DO_PRODUCTION_DOMAIN || 'app.vipr.cash' }}
      DO_PRODUCTION_DOMAIN_ZONE: ${{ vars.DO_PRODUCTION_DOMAIN_ZONE || 'vipr.cash' }}
      DO_PRODUCTION_MAINTENANCE_ENABLED: ${{ vars.DO_PRODUCTION_MAINTENANCE_ENABLED || 'false' }}
      DO_PRODUCTION_REGION: ${{ vars.DO_PRODUCTION_REGION || 'fra' }}
      DO_PRODUCTION_INSTANCE_SIZE: ${{ vars.DO_PRODUCTION_INSTANCE_SIZE || 'apps-s-1vcpu-0.5gb' }}
      DO_PRODUCTION_SERVICE_NAME: ${{ vars.DO_PRODUCTION_SERVICE_NAME || 'ngutech-21-vipr-wallet' }}
      DOCKER_NAME: ${{ secrets.DOCKER_NAME }}
      DOCKER_HUB_CREDENTIALS: ${{ secrets.DOCKER_NAME }}:${{ secrets.DOCKER_PAT }}

    steps:
      - name: Checkout target ref
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.target_ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to docker.io
        uses: docker/login-action@v4.1.0
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_NAME }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Get image SHA
        id: sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Read package version
        id: version
        run: |
          version="$(node -p "require('./package.json').version")"
          if [ -z "$version" ]; then
            echo "Unable to read version from package.json"
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Verify production app is configured
        run: |
          if [ -z "${{ env.DO_PRODUCTION_APP_NAME }}" ]; then
            echo "DO_PRODUCTION_APP_NAME must be configured for production releases"
            exit 1
          fi

      - name: Verify release does not already exist
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "GitHub release ${{ steps.version.outputs.tag }} already exists"
            exit 1
          fi

      - name: Resolve Docker image digest
        id: release-image
        run: |
          image="docker.io/${{ env.DOCKER_NAME }}/vipr-wallet:${{ steps.sha.outputs.sha }}-alpine"
          digest="$(docker buildx imagetools inspect "$image" | awk '/Digest:/ { print $2; exit }')"
          if [ -z "$digest" ]; then
            echo "Unable to resolve digest for $image"
            exit 1
          fi
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Deploy to DigitalOcean
        uses: digitalocean/app_action/deploy@v2
        env:
          VIPR_DIGEST: ${{ steps.release-image.outputs.digest }}
        with:
          token: ${{ secrets.DO_TOKEN }}
          app_spec_location: .do/app.production.yaml

      - name: Tag Docker release image
        run: |
          docker buildx imagetools create \
            --tag "docker.io/${{ env.DOCKER_NAME }}/vipr-wallet:${{ steps.version.outputs.tag }}" \
            --tag "docker.io/${{ env.DOCKER_NAME }}/vipr-wallet:latest" \
            "docker.io/${{ env.DOCKER_NAME }}/vipr-wallet@${{ steps.release-image.outputs.digest }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --target "${{ steps.sha.outputs.sha }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes

      - name: Mark release PR as tagged
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          RELEASE_SHA: ${{ steps.sha.outputs.sha }}
        run: |
          pr_number="$(
            gh api \
              -H "Accept: application/vnd.github+json" \
              "/repos/${GITHUB_REPOSITORY}/commits/${RELEASE_SHA}/pulls" \
              --jq '.[] | select(.merged_at != null and (.title | startswith("chore(master): release "))) | .number' |
              head -n 1
          )"

          if [ -z "$pr_number" ]; then
            echo "No merged release PR found for ${RELEASE_SHA}"
            exit 0
          fi

          gh issue edit "$pr_number" --remove-label "autorelease: pending" || true
          gh issue edit "$pr_number" --add-label "autorelease: tagged"
