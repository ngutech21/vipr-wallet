name: Build Frontend

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Dependency review
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/dependency-review-action@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.1.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        # Enforce deterministic installs from pnpm-lock.yaml:
        # fail CI if package.json and lockfile are out of sync.
        # also fail on peer dependency incompatibilities.
        run: pnpm install --frozen-lockfile --strict-peer-dependencies

      - name: Check code formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Type check PWA
        run: pnpm typecheck:pwa

      - name: Audit production dependencies
        run: pnpm audit --prod

      - name: Verify dependency signatures
        run: pnpm audit signatures

      - name: Check circular dependencies
        run: pnpm dlx madge src --circular

      - name: Build frontend
        run: pnpm build

      - name: Run unit tests with coverage
        run: pnpm coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          verbose: true

  docker-build-pr:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: false
          tags: vipr-wallet:pr-check
          cache-from: type=gha,scope=vipr-wallet-pr
          cache-to: type=gha,mode=max,scope=vipr-wallet-pr
