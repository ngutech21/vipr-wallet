alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED
domains:
  - domain: ${DO_DEV_DOMAIN}
    type: PRIMARY
    zone: ${DO_DEV_DOMAIN_ZONE}
features:
  - buildpack-stack=ubuntu-22
ingress:
  rules:
    - component:
        name: ${DO_DEV_SERVICE_NAME}
      match:
        path:
          prefix: /
name: ${DO_DEV_APP_NAME}
region: ${DO_DEV_REGION}
services:
  - http_port: 80
    image:
      digest: ${VIPR_DIGEST}
      registry: ${DOCKER_NAME}
      registry_credentials: ${DOCKER_HUB_CREDENTIALS}
      registry_type: DOCKER_HUB
      repository: vipr-wallet
    instance_count: 1
    instance_size_slug: ${DO_DEV_INSTANCE_SIZE}
    name: ${DO_DEV_SERVICE_NAME}
